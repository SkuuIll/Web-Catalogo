# Block direct IP access or other domains (HTTP)
server {
    listen 80 default_server;
    server_name _;
    return 444;
}

# Block direct IP access or other domains (HTTPS)
server {
    listen 443 ssl default_server;
    server_name _;
    ssl_certificate /etc/letsencrypt/live/shwrmjr.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shwrmjr.pro/privkey.pem;
    return 444;
}

# Main Site (HTTP & HTTPS)
server {
    listen 80;
    listen 443 ssl;
    server_name shwrmjr.pro www.shwrmjr.pro;

    ssl_certificate /etc/letsencrypt/live/shwrmjr.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shwrmjr.pro/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
