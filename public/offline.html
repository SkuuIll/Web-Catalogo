<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sin conexion - SHOWROOM JR</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0d0d0d;
        color: #fff;
        font-family: Arial, Helvetica, sans-serif;
        padding: 24px;
      }
      main {
        max-width: 420px;
        border: 1px solid rgba(255,255,255,.1);
        background: #1a1a1a;
        border-radius: 10px;
        padding: 28px;
        text-align: center;
      }
      .mark {
        width: 52px;
        height: 52px;
        margin: 0 auto 18px;
        border-radius: 10px;
        display: grid;
        place-items: center;
        background: rgba(200,149,42,.14);
        color: #C8952A;
        font-weight: 900;
      }
      h1 { margin: 0; font-size: 26px; }
      p { color: #aaa; line-height: 1.5; }
      button {
        border: 0;
        border-radius: 8px;
        padding: 12px 18px;
        background: #C8952A;
        color: #000;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">JR</div>
      <h1>Sin conexion</h1>
      <p>No pudimos cargar la tienda. Revisa tu conexion e intenta nuevamente.</p>
      <button onclick="location.reload()">Reintentar</button>
    </main>
  </body>
</html>
